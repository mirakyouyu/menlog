<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
  <meta http-equiv="Pragma" content="no-cache">
  <meta http-equiv="Expires" content="0">
  <title>MeLog</title>
  <link rel="stylesheet" href="style.css?v=5">
</head>
<body>
  <div class="container">
    <header>
      <h1 id="appTitle">MeLog</h1>
      <button id="openFormBtn" class="btn-primary">+ 追加</button>
    </header>

    <!-- ホーム: 店一覧 -->
    <div id="homeView" class="view">
      <div class="search-bar">
        <input type="text" id="searchInput" placeholder="店名で検索..." />
      </div>
      <div id="shopGrid" class="shop-grid">
        <div class="loading">読み込み中...</div>
      </div>
    </div>

    <!-- 店ページ -->
    <div id="shopView" class="view hidden">
      <a href="#" id="backBtn" class="btn-back">← 店一覧へ戻る</a>
      <div class="shop-header">
        <h2 id="shopTitle"></h2>
        <div id="shopStats" class="shop-stats"></div>
      </div>

      <div class="shop-memo-section">
        <div class="memo-header">
          <span class="detail-label">店メモ</span>
          <button id="editMemoBtn" class="btn-link">編集</button>
        </div>
        <div id="shopMemo" class="shop-memo"></div>
        <textarea id="shopMemoEdit" class="hidden" rows="4" placeholder="店全体の感想・備考..."></textarea>
        <div id="memoActions" class="memo-actions hidden">
          <button id="cancelMemoBtn" class="btn-secondary">キャンセル</button>
          <button id="saveMemoBtn" class="btn-primary">保存</button>
        </div>
      </div>

      <div class="shop-entries-header">
        <span class="detail-label">記録一覧</span>
      </div>
      <div id="shopEntries" class="entry-list"></div>
    </div>
  </div>

  <!-- 投稿モーダル -->
  <div id="modal" class="modal hidden">
    <div class="modal-content">
      <div class="modal-header">
        <h2>新規記録</h2>
        <button id="closeModal" class="btn-close">×</button>
      </div>
      <div id="shopPicker" class="shop-picker">
        <div class="shop-picker-label">既存の店から選ぶ</div>
        <div id="shopPickerList" class="shop-picker-list"></div>
      </div>
      <form id="entryForm">
        <div class="form-group">
          <label for="shopName">店名</label>
          <input type="text" id="shopName" placeholder="店名を入力" autocomplete="off" required />
        </div>
        <div class="form-group">
          <label for="therapistName">嬢の名前</label>
          <input type="text" id="therapistName" placeholder="名前を入力" required />
        </div>
        <div class="form-group">
          <label for="rating">評価</label>
          <div class="star-rating" id="starRating">
            <span class="star" data-value="1">★</span>
            <span class="star" data-value="2">★</span>
            <span class="star" data-value="3">★</span>
            <span class="star" data-value="4">★</span>
            <span class="star" data-value="5">★</span>
          </div>
          <input type="hidden" id="rating" value="0" />
        </div>
        <div class="form-group">
          <label for="options">オプション内容</label>
          <textarea id="options" placeholder="オプション内容を入力..." rows="3"></textarea>
        </div>
        <div class="form-group">
          <label for="content">内容・メモ</label>
          <div id="contentPresets" class="preset-list"></div>
          <textarea id="content" placeholder="コース内容、感想など..." rows="5" required></textarea>
        </div>
        <button type="submit" class="btn-primary btn-full">保存</button>
      </form>
    </div>
  </div>

  <!-- 詳細モーダル -->
  <div id="detailModal" class="modal hidden">
    <div class="modal-content">
      <div class="modal-header">
        <h2 id="detailTitle">詳細</h2>
        <button id="closeDetailModal" class="btn-close">×</button>
      </div>
      <div id="detailBody"></div>
      <div class="modal-actions">
        <button id="deleteBtn" class="btn-danger">削除</button>
      </div>
    </div>
  </div>

  <div id="toast" class="toast hidden"></div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="config.js?v=5"></script>
  <script src="app.js?v=5"></script>
</body>
</html>
